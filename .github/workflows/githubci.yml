name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ master ]
  release:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set matrix
        id: set-matrix
        working-directory: src/boards
        run: |
          MATRIX_JSON=$(ls -d */ | sed 's/\/$//' | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true

    - name: Install ARM GCC
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '12.3.Rel1'

    - name: Install Tools
      run: |
        pip3 install adafruit-nrfutil uritemplate requests intelhex setuptools

    # 💡 【重要】ビルドする前に、特定のボード（feather_nrf52840_expressなど）の board.h を上書きします。
    - name: Customize board.h
      if: matrix.board == 'feather_nrf52840_express'
      run: |
        cat << 'EOF' > src/boards/feather_nrf52840_express/board.h
        /* ========================================================================== */
        /* 💡 ここに、あなたオリジナルの board.h の中身を丸ごと貼り付けてください！       */
        /* ========================================================================== */
        #ifndef _FEATHER_NRF52840_EXPRESS_H
        #define _FEATHER_NRF52840_EXPRESS_H

        #define BUTTON_PIN   7
        #define LED_PIN      13
        // ...（お持ちのオリジナルのコードをここにすべて貼り付けます）...

        #endif
        EOF

    - name: Build
      run: |
        # 前回のGitハッシュエラーを防ぐハック
        git() {
          echo "0"
        }
        export -f git

        make BOARD=${{ matrix.board }} all
        make BOARD=${{ matrix.board }} copy-artifact

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board }}
        path: _bin/${{ matrix.board }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: ${{ github.event_name == 'release' }}
      with:
        files: |
          _bin/${{ matrix.board }}/${{ matrix.board }}_bootloader-*.zip
          _bin/${{ matrix.board }}/${{ matrix.board }}_bootloader-*.hex
          _bin/${{ matrix.board }}/update-${{ matrix.board }}_bootloader-*.uf2
