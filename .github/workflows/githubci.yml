name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ master ]
  release:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set matrix
        id: set-matrix
        working-directory: src/boards
        run: |
          MATRIX_JSON=$(ls -d */ | sed 's/\/$//' | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true

    - name: Install ARM GCC
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '12.3.Rel1'

    - name: Install Tools
      run: |
        pip3 install adafruit-nrfutil uritemplate requests intelhex setuptools

    # 💡 【重要】ビルドの直前に、提供いただいたオリジナルの board.h を自動生成して配置します。
    - name: Customize board.h
      if: matrix.board == 'feather_nrf52840_express'
      run: |
        cat << 'EOF' > src/boards/feather_nrf52840_express/board.h
        /*
         * The MIT License (MIT)
         *
         * Copyright (c) 2018 Ha Thach for Adafruit Industries
         *
         * Permission is hereby granted, free of charge, to any person obtaining a copy
         * of this software and associated documentation files (the "Software"), to deal
         * in the Software without restriction, including without limitation the rights
         * to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
         * copies of the Software, and to permit persons to whom the Software is
         * furnished to do so, subject to the following conditions:
         *
         * The above copyright notice and this permission notice shall be included in
         * all copies or substantial portions of the Software.
         *
         * THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
         * IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
         * FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
         * AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
         * LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
         * OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN
         * THE SOFTWARE.
         */

        #ifndef _FEATHER_NRF52840_H
        #define _FEATHER_NRF52840_H

        /*------------------------------------------------------------------*/
        /* LED                                                              */
        /*------------------------------------------------------------------*/
        #define LEDS_NUMBER           0
        //#define LED_PRIMARY_PIN       PINNUM(1, 15)
        //#define LED_SECONDARY_PIN      PINNUM(1, 10)
        //#define LED_STATE_ON          1

        //#define LED_NEOPIXEL          PINNUM(0, 16)
        //#define NEOPIXEL_POWER_PIN    PINNUM(1, 14)
        #define NEOPIXELS_NUMBER      0
        //#define BOARD_RGB_BRIGHTNESS  0x040404

        /*------------------------------------------------------------------*/
        /* BUTTON                                                           */
        /*------------------------------------------------------------------*/
        #define BUTTON_DFU     PINNUM(1, 02)
        #define BUTTON_DFU_OTA PINNUM(0, 24)
        #define BUTTON_PULL            NRF_GPIO_PIN_PULLUP

        //--------------------------------------------------------------------+
        // BLE OTA
        //--------------------------------------------------------------------+
        #define BLEDIS_MANUFACTURER   "Mytest3_OTA"
        #define BLEDIS_MODEL          "Feather nRF52840 Express"

        /*------------------------------------------------------------------*/
        /* QSPI                                                             */
        /*------------------------------------------------------------------*/
        #define QSPI_PIN_CS      PINNUM(0, 20)
        #define QSPI_PIN_SCK     PINNUM(0, 19)
        #define QSPI_PIN_IO0     PINNUM(0, 17)
        #define QSPI_PIN_IO1     PINNUM(0, 22)
        #define QSPI_PIN_IO2     PINNUM(0, 23)
        #define QSPI_PIN_IO3     PINNUM(0, 21)

        //--------------------------------------------------------------------+
        // USB
        //--------------------------------------------------------------------+
        #define USB_DESC_VID           0x239A
        #define USB_DESC_UF2_PID       0x0029
        #define USB_DESC_CDC_ONLY_PID  0x002A

        //------------- UF2 -------------//
        #define UF2_PRODUCT_NAME      "Adafruit Feather nRF52840 Express"
        #define UF2_VOLUME_LABEL      "FTHR840BOOT"
        #define UF2_BOARD_ID          "nRF52840-Feather-revE"
        #define UF2_INDEX_URL         "https://www.adafruit.com/product/4062"

        #endif // _FEATHER_NRF52840_H
        EOF

    - name: Build
      run: |
        # 💡 前回発生した「Gitハッシュのコンパイルエラー（invalid suffix等）」を回避するハック
        git() {
          echo "0"
        }
        export -f git

        make BOARD=${{ matrix.board }} all
        make BOARD=${{ matrix.board }} copy-artifact

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board }}
        path: _bin/${{ matrix.board }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: ${{ github.event_name == 'release' }}
      with:
        files: |
          _bin/${{ matrix.board }}/${{ matrix.board }}_bootloader-*.zip
          _bin/${{ matrix.board }}/${{ matrix.board }}_bootloader-*.hex
          _bin/${{ matrix.board }}/update-${{ matrix.board }}_bootloader-*.uf2
